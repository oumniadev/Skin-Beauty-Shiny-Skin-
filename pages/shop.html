<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skincare Shop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
   
   
    <style>
        body {
    font-family: Arial, sans-serif;
    background-color: #ffeef8;
    color: #333;
    margin: 0;
    padding: 0;
}

header {
    background-color: #ff6f91;
    padding: 20px;
    text-align: center;
}

header nav ul {
    list-style: none;
    padding: 0;
}

header nav ul li {
    display: inline;
    margin: 0 15px;
}

header nav ul li a {
    color: white;
    text-decoration: none;
}

.banner {
    text-align: center;
    padding: 40px;
}

.products {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.product {
    background-color: #fff;
    border: 1px solid #ff6f91;
    border-radius: 5px;
    padding: 15px;
    margin: 10px;
    width: 20%;
    text-align: center;
}

.product img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-bottom: 2px solid #FF69B4;
}
a{
    text-decoration: none; 
}


button {
    text-decoration: none;
    padding: 15px 25px;
    border-radius: 5px;
    font-size: 1rem;
    font-weight: 600;
    transition: background 0.3s;
}

button:hover {
    background-color: #ff4a78;
}
.btn {
    text-decoration: none;
    font-size: 16px;
    font-weight: bold;
    padding: 15px 40px;
    border-radius: 50px;
    color: white;
    text-align: center;
    transition: all 0.3s ease;
    box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(5px); 
    
}
.login-btn {
    background: linear-gradient(45deg, #FF69B4, #FF1493); 
    margin-top: -320px;
}

.login-btn:hover {
    background: linear-gradient(45deg, #FF1493, #FF69B4); 
    box-shadow: 0px 8px 20px rgba(255, 105, 180, 0.5);
    transform: scale(1.05);
}

.signup-btn {
    background: linear-gradient(45deg, #6A5ACD, #483D8B);
    margin-top: -320px;
}

.signup-btn:hover {
    background: linear-gradient(45deg, #483D8B, #6A5ACD); 
    box-shadow: 0px 8px 20px rgba(106, 90, 205, 0.5);
    transform: scale(1.05);
}
.footer {
    text-align: center;
    padding: 20px;
    background-color: rgb(255, 255, 255);
    color: rgb(243, 208, 208);
}

.footer p {
    font-size: 0.9rem;
}

.social-icons {
    display: flex;
    justify-content: center;
    margin-bottom: 15px;
}

.social-icons a {
    margin: 0 10px;
}

.social-icons img {
    height: 30px;
    width: 30px;
}


    </style>
     <header>
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="/index.html">Accueil</a></li>
                <li><a href="propos.html">À propos</a></li>
                <li><a href="conatct.html">Contact</a></li>
            </ul>
            <div class="button-container">
                <a href="login.html" class="btn login-btn">Log In</a>
                <a href="sing up.html" class="btn signup-btn">Sign Up</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="banner">
            <h2>Glow Your Skin</h2>
            <p>Discover our range of skincare products for a radiant you!</p>
        </section>

        <section class="products">
            <div class="product">
                <img src="/img/m7.webp" alt="Moisturizer">
                <h4>Hydrating Moisturizer</h4>
                <p>$25.00</p>
                <button onclick="addToCart('Hydrating Moisturizer')"><a href="add card.html">Add to Cart</a></button>
            </div>
            <div class="product">
                <img src="/img/serum.webp" alt="Face Serum">
                <h4>Revitalizing Face Serum</h4>
                <p>$30.00</p>
                <button onclick="addToCart('Revitalizing Face Serum')"><a href="add card.html">Add to Cart</a></button>
            </div>
            <div class="product">
                <img src="/img/sun scren.jpeg" alt="Sunscreen">
                <h4>SPF 50 Sunscreen</h4>
                <p>$20.00</p>
                <button onclick="addToCart('SPF 50 Sunscreen')"><a href="add card.html">Add to Cart</a></button>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="social-icons">
            <a href="#"><img src="/img/facebook.png" alt="Facebook"></a>
            <a href="https://www.instagram.com/webweaver08/"><img src="/img/instagram.png" alt="Instagram"></a>
            <a href="#"><img src="/img/twitter.png" alt="Twitter"></a>
        </div>
    <p>&copy; 2024 Beauty Life. All rights reserved.</p>
    <P> devloped by oumnia selmane</P>
    </footer>

    <script src="index.js"></script>
</body>
</html>
